<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cotizador GNC · Quirgroup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div id="fatal" style="display:none;max-width:1140px;margin:12px auto 0;padding:10px 14px;border:1px solid #fecaca;background:#fff1f2;color:#7f1d1d;border-radius:12px;font-weight:800;"></div>

  <div class="topbar">
    <div class="topwrap">
      <div class="brand">
        <div class="logo">Q</div>
        <div>
          <h1>Cotizador GNC</h1>
          <div class="sub">Lista Abril 2026 · mostrador</div>
        </div>
      </div>
      <div class="actionsTop">
        <div class="pill" id="status">—</div>
        <button class="btnTop" id="copyTop" type="button">📋 Copiar</button>
        <button class="btnTop primary" id="openPresupuesto" type="button">Generar Presupuesto →</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" type="button"><span class="dot"></span>Cotizar</button>
      <button class="tab" type="button" disabled style="opacity:.4;cursor:not-allowed">Lista</button>
      <button class="tab" type="button" disabled style="opacity:.4;cursor:not-allowed">Notas</button>
    </div>
  </div>

  <div class="wrap">
    <div class="leftCol">
      <div class="card">
        <div class="cardHead">
          <div class="t">Configuración del equipo</div>
          <div class="pill small">generación · cilindro · pago</div>
        </div>
        <div class="cardBody">
          <div class="grid2">
            <div>
              <label>Generación</label>
              <div class="seg">
                <button id="gen5" class="active" type="button">5ª Gen</button>
                <button id="gen4" type="button">4ª Gen</button>
              </div>
            </div>
            <div>
              <label>Cilindro (capacidad)</label>
              <select id="cilSelect"></select>
            </div>
          </div>
          <div class="divider"></div>
          <div class="grid4">
            <div>
              <label>Asesor</label>
              <input id="asesorInput" class="textInput" type="text" placeholder="Tu nombre" />
            </div>
            <div>
              <label>Cliente</label>
              <input id="clienteInput" class="textInput" type="text" placeholder="Nombre del cliente" />
            </div>
            <div>
              <label>Teléfono cliente</label>
              <input id="telefonoInput" class="textInput" type="text" placeholder="Ej: 3512345678" />
            </div>
            <div>
              <label>Vehículo <span class="req">*</span></label>
              <input id="modeloInput" class="textInput" type="text" placeholder="Ej: VENTO 2.5 / GOL TREND" />
            </div>
          </div>
          <div class="divider"></div>
          <div>
            <label>Forma de pago</label>
            <div class="payMain" id="payMain"></div>
            <div class="subPay" id="subPay">
              <label style="margin:0 0 8px">Cuotas financiadas</label>
              <div class="subGrid" id="paySub"></div>
            </div>
          </div>
          <div class="divider"></div>
          <div>
            <label>Observaciones para el presupuesto <span class="opt">(opcional)</span></label>
            <input id="obsInput" class="textInput" type="text" placeholder="Ej: Incluye patente / Precio especial acordado" value="Validez por tiempo limitado." />
          </div>
        </div>
      </div>
    </div>

    <div class="rightCol">
      <div class="card resultCard">
        <div class="cardHead">
          <div class="t">Precio seleccionado</div>
          <div class="pill small" id="payLabel">—</div>
        </div>
        <div class="resultTop">
          <div class="resultLine" id="line1">—</div>
          <div class="resultTotal" id="totalBig">—</div>
          <div class="resultSub" id="cuotaInfo"></div>
        </div>
        <div class="resultMeta">
          <div class="metaRow"><div class="k">Cilindro (ref.)</div><div class="v" id="cilRef">—</div></div>
          <div class="metaRow"><div class="k">Cuota</div><div class="v" id="cuotaRef">—</div></div>
          <div class="metaRow"><div class="k">Detalle</div><div class="v" id="detail">—</div></div>
        </div>
        <div class="resultActions">
          <button class="copyBtn" id="copyBtn" type="button">📋 COPIAR PRECIO</button>
          <button class="resetBtn" id="resetBtn" type="button">Resetear</button>
        </div>
      </div>

      <div class="card tableCard">
        <div class="cardHead">
          <div class="t">Comparativa de precios</div>
          <div class="pill small" id="tableLabel">—</div>
        </div>
        <div class="priceTable" id="priceTable"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copiado</div>
  <div class="modal" id="validationModal">
    <div class="modalBox">
      <div class="modalTitle">⚠ Completá el vehículo</div>
      <div class="modalText">El campo <strong>Vehículo</strong> es necesario para generar el presupuesto.</div>
      <button class="modalBtn" id="modalClose">Entendido</button>
    </div>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
